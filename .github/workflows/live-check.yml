# Weekly live check vs production — pattern borrowed from
# klappy/git-repo-auth-mcp/.github/workflows/live-check.yml.
#
# PR-time smoke proves the branch preview; this proves prod is still healthy
# between merges (secret rotation, KV drift, upstream changes). On failure it
# opens a deduplicated issue. Reads the prod base URL from the PROD_BASE_URL
# repo variable; if unset (prod not stood up yet), it skips rather than alarm.

name: Live Check

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  smoke-prod:
    name: Smoke vs prod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Skip if prod URL not configured
        id: guard
        run: |
          if [ -z "${{ vars.PROD_BASE_URL }}" ]; then
            echo "PROD_BASE_URL not set — production not stood up yet. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip == 'false'

      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip == 'false'
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
        if: steps.guard.outputs.skip == 'false'

      - name: Run smoke battery against prod
        id: smoke
        if: steps.guard.outputs.skip == 'false'
        continue-on-error: true
        env:
          SMOKE_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: npm run test:smoke

      - name: Open issue on failure (no duplicates)
        if: steps.guard.outputs.skip == 'false' && steps.smoke.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Live check failed: prod smoke battery"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state open --search "\"$TITLE\" in:title" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "The weekly smoke battery against ${{ vars.PROD_BASE_URL }} failed. See the run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            echo "Open issue already exists; not duplicating."
          fi

      - name: Fail the job if smoke failed
        if: steps.guard.outputs.skip == 'false' && steps.smoke.outcome == 'failure'
        run: exit 1
