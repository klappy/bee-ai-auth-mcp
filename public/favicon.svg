<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="bee-ai-auth-mcp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12624F"/>
      <stop offset="1" stop-color="#0B4E3E"/>
    </linearGradient>
    <clipPath id="body"><ellipse cx="256" cy="294" rx="84" ry="122"/></clipPath>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- wings -->
  <g fill="#FBF8EE" fill-opacity="0.95" stroke="#0B4E3E" stroke-width="4">
    <ellipse cx="170" cy="216" rx="62" ry="100" transform="rotate(-25 170 216)"/>
    <ellipse cx="342" cy="216" rx="62" ry="100" transform="rotate(25 342 216)"/>
  </g>
  <!-- body -->
  <ellipse cx="256" cy="294" rx="84" ry="122" fill="#E7A92B"/>
  <g clip-path="url(#body)" fill="#16201B">
    <rect x="150" y="216" width="212" height="32" rx="16"/>
    <rect x="150" y="278" width="212" height="32" rx="16"/>
    <rect x="150" y="340" width="212" height="32" rx="16"/>
  </g>
  <ellipse cx="256" cy="294" rx="84" ry="122" fill="none" stroke="#16201B" stroke-width="5" stroke-opacity="0.30"/>
  <!-- head -->
  <circle cx="256" cy="182" r="48" fill="#16201B"/>
  <!-- antennae -->
  <g stroke="#16201B" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M242 146 C230 116 216 108 202 106"/>
    <path d="M270 146 C282 116 296 108 310 106"/>
  </g>
  <circle cx="200" cy="104" r="9" fill="#16201B"/>
  <circle cx="312" cy="104" r="9" fill="#16201B"/>
  <!-- stinger -->
  <path d="M256 424 l-13 -24 h26 z" fill="#16201B"/>
</svg>
