    <h1>bee-ai-auth-mcp</h1>
    <p>A self-host-first, OAuth-secured MCP relay for a Bee pendant's retrieval API. Phase 1: auth core + <code>whoami</code>.</p>
    <p>This is plumbing — add it as a custom connector in your MCP client. Self-host holds no one else's credentials; your Bee token is your own Worker secret. <a href="https://github.com/klappy/bee-ai-auth-mcp">Source &amp; setup</a>.</p>
